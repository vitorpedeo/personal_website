# lefthook.yml

pre-commit:
  parallel: true
  jobs:
    - name: biome
      run: pnpx @biomejs/biome check --write --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      glob: '*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}'
      stage_fixed: true

pre-push:
  parallel: true
  jobs:
    - name: type-check
      run: pnpm tsc --noEmit --skipLibCheck

    - name: build
      run: pnpm build
